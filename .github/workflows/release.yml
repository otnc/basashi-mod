name: Release

on:
  workflow_dispatch:
    inputs:
      mod_version:
        description: "MODバージョン (例: 1.0.0)"
        required: true
        default: "1.0.0"

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Resolve versions
        id: ver
        run: |
          MOD="${{ inputs.mod_version }}"
          MC=$(grep -E '^minecraft_version=' gradle.properties | cut -d= -f2 | tr -d '[:space:]')
          echo "mod=$MOD" >> "$GITHUB_OUTPUT"
          echo "mc=$MC" >> "$GITHUB_OUTPUT"
          echo "tag=v${MOD}+${MC}" >> "$GITHUB_OUTPUT"
          echo "Releasing basashi $MOD for Minecraft $MC"

      - name: Build
        run: ./gradlew build -Pmod_version=${{ steps.ver.outputs.mod }} --stacktrace

      - name: Prepare release jar
        id: jar
        run: |
          MC="${{ steps.ver.outputs.mc }}"
          MOD="${{ steps.ver.outputs.mod }}"
          SRC="forge/build/libs/basashi-forge-${MC}-${MOD}.jar"
          DEST="basashi-${MC}-${MOD}.jar"
          if [ ! -f "$SRC" ]; then
            echo "::error::Expected jar not found: $SRC"
            ls -la forge/build/libs || true
            exit 1
          fi
          cp "$SRC" "$DEST"
          echo "asset=$DEST" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: "馬刺しMOD ${{ steps.ver.outputs.mod }} (MC ${{ steps.ver.outputs.mc }})"
          generate_release_notes: true
          body: |
            ## 馬刺しMOD `${{ steps.ver.outputs.mod }}` — Minecraft ${{ steps.ver.outputs.mc }}

            **対応ローダー: Forge / NeoForge ${{ steps.ver.outputs.mc }}**
            （${{ steps.ver.outputs.mc }} では NeoForge が Forge 互換のため、この jar 1つで両方に対応します）

            ### 導入方法
            `${{ steps.jar.outputs.asset }}` を Forge または NeoForge ${{ steps.ver.outputs.mc }} の `mods` フォルダに入れてください。
          files: ${{ steps.jar.outputs.asset }}

name: Release

on:
  workflow_dispatch:
    inputs:
      mod_version:
        description: "MODバージョン (例: 1.1.0)"
        required: true
        default: "1.1.0"

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # 各MC版をビルドし、Modrinth / CurseForge へ版ごとに個別公開する
  publish:
    name: Publish ${{ matrix.mc }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - mc: "1.20.1"
            java: "17"
            dir: versions/1.20.1
            loaders: |
              forge
              neoforge
            deps: |
              architectury-api(required)
          - mc: "1.16.5"
            java: "8"
            dir: versions/1.16.5
            loaders: |
              forge
            deps: ""
          - mc: "1.12.2"
            java: "8"
            dir: versions/1.12.2
            loaders: |
              forge
            deps: ""
          - mc: "1.7.10"
            java: "17" # RFG は Gradle を Java 17 で実行
            dir: versions/1.7.10
            loaders: |
              forge
            deps: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Make gradlew executable
        run: chmod +x ${{ matrix.dir }}/gradlew

      - name: Build
        working-directory: ${{ matrix.dir }}
        run: ./gradlew build -Pmod_version=${{ inputs.mod_version }} --stacktrace

      - name: Prepare release jar
        id: jar
        run: |
          MC="${{ matrix.mc }}"
          MOD="${{ inputs.mod_version }}"
          if [ "$MC" = "1.20.1" ]; then
            SRC="versions/1.20.1/forge/build/libs/basashi-forge-1.20.1-${MOD}.jar"
          else
            SRC="${{ matrix.dir }}/build/libs/basashi-${MC}-${MOD}.jar"
          fi
          DEST="basashi-${MC}-${MOD}.jar"
          if [ ! -f "$SRC" ]; then
            echo "::error::Expected jar not found: $SRC"
            ls -la "$(dirname "$SRC")" || true
            exit 1
          fi
          cp "$SRC" "$DEST"
          echo "asset=$DEST" >> "$GITHUB_OUTPUT"

      - name: Upload jar for GitHub Release job
        uses: actions/upload-artifact@v4
        with:
          name: release-jar-${{ matrix.mc }}
          path: ${{ steps.jar.outputs.asset }}
          if-no-files-found: error
          retention-days: 7

      # Modrinth / CurseForge へ公開（ID・トークン未設定のプラットフォームは自動でスキップ）
      # 版ごとに独立したバージョン（例 1.1.0+1.16.5）として公開する
      - name: Publish to Modrinth / CurseForge
        uses: Kir-Antipov/mc-publish@v3.3.0
        with:
          modrinth-id: ${{ vars.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          curseforge-id: ${{ vars.CURSEFORGE_PROJECT_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          files: ${{ steps.jar.outputs.asset }}
          name: "馬刺しMOD ${{ inputs.mod_version }} (MC ${{ matrix.mc }})"
          version: "${{ inputs.mod_version }}+${{ matrix.mc }}"
          version-type: release
          loaders: ${{ matrix.loaders }}
          game-versions: "${{ matrix.mc }}"
          dependencies: ${{ matrix.deps }}

  # 全版の jar を集めて 1 つの GitHub Release にまとめる
  github-release:
    name: GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Download all release jars
        uses: actions/download-artifact@v4
        with:
          pattern: release-jar-*
          path: dist
          merge-multiple: true

      - name: List jars
        run: ls -la dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "v${{ inputs.mod_version }}"
          name: "馬刺しMOD ${{ inputs.mod_version }}"
          generate_release_notes: true
          body: |
            ## 馬刺しMOD `${{ inputs.mod_version }}`

            対応バージョン:

            | Minecraft | ローダー | 前提MOD |
            |---|---|---|
            | 1.20.1 | Forge / NeoForge | Architectury API |
            | 1.16.5 | Forge | なし |
            | 1.12.2 | Forge | なし |

            ### 導入方法
            使用する Minecraft バージョンに対応する `basashi-<MC>-${{ inputs.mod_version }}.jar` を `mods` フォルダに入れてください（1.20.1 のみ Architectury API が必要）。
          files: dist/*.jar

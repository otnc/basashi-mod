name: Build

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.mc }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - mc: "1.20.1"
            java: "17"
            dir: versions/1.20.1
            jar: versions/1.20.1/forge/build/libs/basashi-forge-1.20.1-*.jar
          - mc: "1.16.5"
            java: "8"
            dir: versions/1.16.5
            jar: versions/1.16.5/build/libs/basashi-1.16.5-*.jar
          - mc: "1.12.2"
            java: "8"
            dir: versions/1.12.2
            jar: versions/1.12.2/build/libs/basashi-1.12.2-*.jar
          - mc: "1.7.10"
            java: "17" # RFG は Gradle を Java 17 で実行（MCコンパイルは内部のJava8 toolchain）
            dir: versions/1.7.10
            jar: versions/1.7.10/build/libs/basashi-1.7.10-*.jar
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Make gradlew executable
        run: chmod +x ${{ matrix.dir }}/gradlew

      - name: Build
        working-directory: ${{ matrix.dir }}
        run: ./gradlew build --stacktrace

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: basashi-dev-${{ matrix.mc }}
          path: |
            ${{ matrix.jar }}
            !**/*-sources.jar
            !**/*-dev.jar
            !**/*-dev-shadow.jar
          if-no-files-found: error
          retention-days: 14
